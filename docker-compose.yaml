services:
  claude-tg:
    build: .
    container_name: claude-tg
    restart: unless-stopped
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_ALLOWED_USERS=${TELEGRAM_ALLOWED_USERS}
      - CLAUDE_WORKING_DIR=/vault
      - ALLOWED_PATHS=/vault,/root/.claude
      # Whitelist root for --dangerously-skip-permissions (bot uses bypassPermissions mode)
      - IS_SANDBOX=1
      # Pull portable Claude config (skills/agents/commands + dokploy MCP) at boot.
      # Deploy key (base64) lets the entrypoint clone the private claude-config repo.
      - CLAUDE_CONFIG_DEPLOY_KEY_B64=${CLAUDE_CONFIG_DEPLOY_KEY_B64}
      - DOKPLOY_URL=${DOKPLOY_URL}
      - DOKPLOY_API_KEY=${DOKPLOY_API_KEY}
    volumes:
      - claude_auth:/root/.claude
      - vault:/vault
  obsidian-sync:
    build:
      context: .
      dockerfile: Dockerfile.obsidian
    container_name: obsidian-sync
    restart: unless-stopped
    volumes:
      - vault:/vault
      - obsidian_cfg:/root
    # Retry loop: until `ob login` + `ob sync-setup` have been run once (state
    # persists on the obsidian_cfg + vault volumes), continuous sync isn't ready.
    command: ["sh", "-c", "while true; do ob sync --path /vault --continuous || { echo 'obsidian-sync: not configured yet (run ob login + ob sync-setup), retrying in 30s'; sleep 30; }; done"]
volumes:
  claude_auth:
  vault:
  obsidian_cfg:
